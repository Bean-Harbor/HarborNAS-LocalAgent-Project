<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HarborBot Folder Icon Preview</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3fb;
        --tile: #fbf9fe;
        --tile-border: rgba(112, 86, 142, 0.14);
        --ink: #101016;
        --muted: #6d6578;
        --violet: #6c18f0;
        --violet-2: #8f34ff;
        --violet-3: #b99cf4;
        --paper: #f6f1fb;
        --shadow: 0 16px 34px rgba(87, 64, 117, 0.12);
        --tile-radius: 28px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 34px;
        color: var(--ink);
        background:
          radial-gradient(circle at 24% 12%, rgba(135, 70, 255, 0.1), transparent 28%),
          linear-gradient(180deg, #fbf8ff, var(--bg));
        font-family:
          "Avenir Next",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans SC",
          sans-serif;
      }

      .preview-stage {
        width: min(620px, 100%);
        display: grid;
        gap: 30px;
        justify-items: center;
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(2, 108px);
        gap: 28px 36px;
        justify-content: center;
      }

      .app-button {
        appearance: none;
        display: grid;
        gap: 10px;
        justify-items: center;
        width: 108px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
      }

      .icon-card {
        width: 108px;
        height: 108px;
        display: grid;
        place-items: center;
        border-radius: var(--tile-radius);
        border: 1px solid var(--tile-border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), var(--tile));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.92),
          var(--shadow);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .app-button:hover .icon-card,
      .app-button:focus-visible .icon-card {
        transform: translateY(-2px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.92),
          0 20px 40px rgba(87, 64, 117, 0.16);
      }

      .app-button:focus-visible {
        outline: none;
      }

      .app-button:focus-visible .icon-card {
        outline: 3px solid rgba(108, 24, 240, 0.22);
        outline-offset: 5px;
      }

      .app-label {
        max-width: 108px;
        font-size: 13px;
        line-height: 1.2;
        text-align: center;
      }

      .folder-svg,
      .plain-svg {
        width: 66px;
        height: 66px;
        overflow: visible;
      }

      .plain-svg .plain-fill {
        fill: url(#plain-fill);
      }

      .plain-svg .plain-fade {
        fill: url(#plain-fade);
      }

      .folder-icon {
        transform-box: fill-box;
        transform-origin: center;
      }

      .folder-base {
        filter: drop-shadow(0 9px 8px rgba(75, 26, 202, 0.18));
      }

      .folder-back {
        fill: url(#folder-back-fill);
        transform-box: fill-box;
        transform-origin: 18% 75%;
      }

      .folder-sheet {
        fill: url(#folder-sheet-fill);
        opacity: 0;
        transform: translateY(8px) scaleY(0.88);
        transform-box: fill-box;
        transform-origin: center bottom;
      }

      .folder-front {
        fill: url(#folder-front-fill);
        transform-box: fill-box;
        transform-origin: 50% 92%;
      }

      .folder-highlight {
        fill: url(#folder-glow-fill);
        opacity: 0.58;
        transform-box: fill-box;
        transform-origin: center;
      }

      .folder-sheen {
        fill: #ffffff;
        opacity: 0;
        filter: blur(3px);
      }

      .folder-shadow-line {
        fill: none;
        stroke: #d8c7ef;
        stroke-linecap: round;
        stroke-width: 3;
        opacity: 0.75;
        transform-box: fill-box;
        transform-origin: center;
      }

      .folder-button.is-playing .folder-icon {
        animation: folder-click-pop 760ms cubic-bezier(.2, .8, .2, 1);
      }

      .folder-button.is-playing .folder-back {
        animation: folder-lid-open 820ms cubic-bezier(.2, .8, .18, 1);
      }

      .folder-button.is-playing .folder-sheet {
        animation: folder-sheet-rise 820ms cubic-bezier(.2, .8, .18, 1);
      }

      .folder-button.is-playing .folder-front {
        animation: folder-front-open 820ms cubic-bezier(.2, .8, .18, 1);
      }

      .folder-button.is-playing .folder-highlight {
        animation: folder-highlight-shift 820ms ease-in-out;
      }

      .folder-button.is-playing .folder-sheen {
        animation: folder-sheen 820ms ease-out;
      }

      .folder-button.is-playing .folder-shadow-line {
        animation: folder-ground-shadow 820ms ease-in-out;
      }

      .inspection {
        width: min(420px, 100%);
        display: grid;
        grid-template-columns: 148px minmax(0, 1fr);
        gap: 18px;
        align-items: center;
      }

      .large-card {
        width: 148px;
        height: 148px;
        display: grid;
        place-items: center;
        border-radius: 34px;
        border: 1px solid var(--tile-border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), var(--tile));
        box-shadow: var(--shadow);
      }

      .large-card img {
        width: 104px;
        height: 104px;
      }

      .replay-panel {
        display: grid;
        gap: 12px;
      }

      .replay-title {
        margin: 0;
        font-size: 20px;
        line-height: 1.1;
      }

      .replay-note {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .replay-button {
        appearance: none;
        justify-self: start;
        min-height: 40px;
        padding: 9px 15px;
        border: 1px solid rgba(108, 24, 240, 0.18);
        border-radius: 999px;
        background: rgba(108, 24, 240, 0.08);
        color: var(--violet);
        font-weight: 800;
        cursor: pointer;
      }

      @keyframes folder-click-pop {
        0%, 100% { transform: translateY(0) scale(1); }
        12% { transform: translateY(1px) scale(0.96, 1.04); }
        32% { transform: translateY(-4px) scale(1.04, 0.97); }
        62% { transform: translateY(0) scale(1); }
      }

      @keyframes folder-lid-open {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        36%, 62% { transform: translate(-2px, -8px) rotate(-10deg); }
      }

      @keyframes folder-sheet-rise {
        0%, 100% { opacity: 0; transform: translateY(8px) scaleY(0.88); }
        34%, 64% { opacity: 0.96; transform: translateY(-7px) scaleY(1); }
      }

      @keyframes folder-front-open {
        0%, 100% { transform: translateY(0) scaleY(1); }
        36%, 62% { transform: translateY(5px) scaleY(0.82); }
      }

      @keyframes folder-highlight-shift {
        0%, 100% { opacity: 0.46; transform: translateY(0); }
        36%, 62% { opacity: 0.72; transform: translateY(4px); }
      }

      @keyframes folder-sheen {
        0%, 18%, 100% { opacity: 0; transform: translate(-10px, 10px) rotate(-12deg); }
        42% { opacity: 0.58; transform: translate(2px, 0) rotate(-12deg); }
        64% { opacity: 0; transform: translate(13px, -6px) rotate(-12deg); }
      }

      @keyframes folder-ground-shadow {
        0%, 100% { opacity: 0.7; transform: scaleX(0.74); }
        36%, 62% { opacity: 0.96; transform: scaleX(1); }
      }

      @media (max-width: 560px) {
        body {
          padding: 24px 18px;
        }

        .inspection {
          grid-template-columns: 1fr;
          justify-items: center;
          text-align: center;
        }

        .replay-button {
          justify-self: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-stage" aria-label="HarborBot folder icon preview">
      <section class="icon-grid" aria-label="Icon grid preview">
        <button class="app-button" type="button" aria-label="Dataset">
          <span class="icon-card">
            <svg class="plain-svg" viewBox="0 0 72 72" aria-hidden="true">
              <defs>
                <linearGradient id="plain-fill" x1="18" y1="18" x2="52" y2="54" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#8f34ff"/>
                  <stop offset="1" stop-color="#6816ef"/>
                </linearGradient>
                <linearGradient id="plain-fade" x1="30" y1="27" x2="49" y2="50" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#ffffff"/>
                  <stop offset="1" stop-color="#e8e3ef"/>
                </linearGradient>
              </defs>
              <rect class="plain-fill" x="18" y="18" width="22" height="36" rx="8"/>
              <rect class="plain-fade" x="27" y="23" width="28" height="28" rx="7"/>
              <path d="M36 31h9M36 39h14M36 47h8" stroke="#6816ef" stroke-width="3.2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="app-label">Dataset</span>
        </button>

        <button class="app-button folder-button" type="button" data-folder aria-label="Open HarborBot folder icon">
          <span class="icon-card">
            <svg class="folder-svg" viewBox="0 0 72 72" role="img" aria-labelledby="folder-title folder-desc">
              <title id="folder-title">HarborBot</title>
              <desc id="folder-desc">A purple folder icon that opens when clicked.</desc>
              <defs>
                <linearGradient id="folder-back-fill" x1="18" y1="20" x2="56" y2="54" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#8f34ff"/>
                  <stop offset="0.58" stop-color="#6816ef"/>
                  <stop offset="1" stop-color="#5320d6"/>
                </linearGradient>
                <linearGradient id="folder-front-fill" x1="20" y1="31" x2="45" y2="60" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#7a16f4"/>
                  <stop offset="0.42" stop-color="#8d35ff"/>
                  <stop offset="0.72" stop-color="#b99cf4"/>
                  <stop offset="1" stop-color="#ece8f2"/>
                </linearGradient>
                <linearGradient id="folder-sheet-fill" x1="27" y1="27" x2="48" y2="51" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#ffffff"/>
                  <stop offset="1" stop-color="#dcd2ee"/>
                </linearGradient>
                <linearGradient id="folder-glow-fill" x1="22" y1="38" x2="51" y2="58" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
                  <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <g class="folder-icon">
                <g class="folder-base">
                  <path class="folder-back" d="M14.5 25.8c0-3.2 2.6-5.8 5.8-5.8h12.5c2 0 3 .8 4.1 2.3l2 2.7h14.7c3.1 0 5.7 2.5 5.7 5.7v19.7H14.5z"/>
                  <path class="folder-sheet" d="M24.6 29.3h19.8c2.5 0 4.5 2 4.5 4.5v16.6H23.1V30.8c0-.8.7-1.5 1.5-1.5z"/>
                  <path class="folder-front" d="M13 36.3c0-3.2 2.6-5.8 5.8-5.8h34.4c3.2 0 5.8 2.6 5.8 5.8v13.9c0 4.3-3.5 7.8-7.8 7.8H20.8c-4.3 0-7.8-3.5-7.8-7.8z"/>
                  <path class="folder-highlight" d="M16.4 47.5c7.2-4.3 14.7-4.7 22.4-1.1 6 2.8 11.4 2.6 16.7-.3v6.7c0 2.1-1.7 3.8-3.8 3.8H20.4c-2.2 0-4-1.8-4-4z"/>
                  <path class="folder-sheen" d="M21 46.4c9-7.8 19.8-9 32.5-3.6l-3.1 5.2c-10-4.1-18.8-3-26.5 3.5z"/>
                </g>
                <path class="folder-shadow-line" d="M23.2 62h25.6"/>
              </g>
            </svg>
          </span>
          <span class="app-label">HarborBot</span>
        </button>
      </section>

      <section class="inspection" aria-label="Folder icon inspection">
        <div class="large-card">
          <img src="./harborbot-dynamic-icon.svg" alt="Animated HarborBot folder icon concept">
        </div>
        <div class="replay-panel">
          <h1 class="replay-title">HarborBot</h1>
          <p class="replay-note">Purple folder icon with a click-to-open motion, matching the HarborOS icon-grid style.</p>
          <button class="replay-button" type="button" data-replay>Replay open</button>
        </div>
      </section>
    </main>

    <script>
      const folderButton = document.querySelector('[data-folder]');
      const replay = document.querySelector('[data-replay]');

      function playFolder() {
        folderButton.classList.remove('is-playing');
        void folderButton.offsetWidth;
        folderButton.classList.add('is-playing');
      }

      folderButton.addEventListener('click', playFolder);
      replay.addEventListener('click', playFolder);
      window.addEventListener('load', () => window.setTimeout(playFolder, 260));
    </script>
  </body>
</html>
