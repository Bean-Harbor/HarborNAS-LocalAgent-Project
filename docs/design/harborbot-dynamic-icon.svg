<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" role="img" aria-labelledby="title desc">
  <title id="title">HarborBot folder dynamic icon concept</title>
  <desc id="desc">A purple HarborOS-style folder icon that opens with a soft click animation.</desc>
  <defs>
    <linearGradient id="folder-back-fill" x1="18" y1="20" x2="56" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8f34ff"/>
      <stop offset="0.58" stop-color="#6816ef"/>
      <stop offset="1" stop-color="#5320d6"/>
    </linearGradient>
    <linearGradient id="folder-front-fill" x1="20" y1="31" x2="45" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7a16f4"/>
      <stop offset="0.42" stop-color="#8d35ff"/>
      <stop offset="0.72" stop-color="#b99cf4"/>
      <stop offset="1" stop-color="#ece8f2"/>
    </linearGradient>
    <linearGradient id="folder-sheet-fill" x1="27" y1="27" x2="48" y2="51" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcd2ee"/>
    </linearGradient>
    <linearGradient id="folder-glow-fill" x1="22" y1="38" x2="51" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="folder-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="7" flood-color="#4b1aca" flood-opacity="0.22"/>
    </filter>
    <filter id="folder-soft-glow" x="-30%" y="-35%" width="160%" height="170%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <style>
    .folder-icon {
      transform-box: fill-box;
      transform-origin: center;
      animation: folder-click-pop 2800ms cubic-bezier(.2, .8, .2, 1) infinite;
    }

    .folder-base {
      filter: url(#folder-shadow);
    }

    .folder-back {
      fill: url(#folder-back-fill);
      transform-box: fill-box;
      transform-origin: 18% 75%;
      animation: folder-lid-open 2800ms cubic-bezier(.2, .8, .18, 1) infinite;
    }

    .folder-sheet {
      fill: url(#folder-sheet-fill);
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center bottom;
      animation: folder-sheet-rise 2800ms cubic-bezier(.2, .8, .18, 1) infinite;
    }

    .folder-front {
      fill: url(#folder-front-fill);
      transform-box: fill-box;
      transform-origin: 50% 92%;
      animation: folder-front-open 2800ms cubic-bezier(.2, .8, .18, 1) infinite;
    }

    .folder-highlight {
      fill: url(#folder-glow-fill);
      opacity: 0.58;
      transform-box: fill-box;
      transform-origin: center;
      animation: folder-highlight-shift 2800ms ease-in-out infinite;
    }

    .folder-sheen {
      fill: #ffffff;
      opacity: 0;
      filter: url(#folder-soft-glow);
      animation: folder-sheen 2800ms ease-out infinite;
    }

    .folder-shadow-line {
      fill: none;
      stroke: #d8c7ef;
      stroke-linecap: round;
      stroke-width: 3;
      opacity: 0.82;
      transform-box: fill-box;
      transform-origin: center;
      animation: folder-ground-shadow 2800ms ease-in-out infinite;
    }

    @keyframes folder-click-pop {
      0%, 56%, 100% { transform: translateY(0) scale(1); }
      8% { transform: translateY(1px) scale(0.96, 1.04); }
      18% { transform: translateY(-4px) scale(1.04, 0.97); }
      30% { transform: translateY(0) scale(1); }
    }

    @keyframes folder-lid-open {
      0%, 9%, 58%, 100% { transform: translateY(0) rotate(0deg); }
      23%, 43% { transform: translate(-2px, -8px) rotate(-10deg); }
    }

    @keyframes folder-sheet-rise {
      0%, 10%, 58%, 100% { opacity: 0; transform: translateY(8px) scaleY(0.88); }
      24%, 44% { opacity: 0.96; transform: translateY(-7px) scaleY(1); }
    }

    @keyframes folder-front-open {
      0%, 10%, 58%, 100% { transform: translateY(0) scaleY(1); }
      24%, 44% { transform: translateY(5px) scaleY(0.82); }
    }

    @keyframes folder-highlight-shift {
      0%, 12%, 58%, 100% { opacity: 0.46; transform: translateY(0); }
      24%, 44% { opacity: 0.72; transform: translateY(4px); }
    }

    @keyframes folder-sheen {
      0%, 18%, 60%, 100% { opacity: 0; transform: translate(-10px, 10px) rotate(-12deg); }
      30% { opacity: 0.62; transform: translate(2px, 0) rotate(-12deg); }
      45% { opacity: 0; transform: translate(13px, -6px) rotate(-12deg); }
    }

    @keyframes folder-ground-shadow {
      0%, 58%, 100% { opacity: 0.7; transform: scaleX(0.74); }
      23%, 44% { opacity: 0.96; transform: scaleX(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .folder-icon,
      .folder-back,
      .folder-sheet,
      .folder-front,
      .folder-highlight,
      .folder-sheen,
      .folder-shadow-line {
        animation: none;
      }

      .folder-sheet {
        opacity: 0.9;
        transform: translateY(-7px);
      }

      .folder-front {
        transform: translateY(5px) scaleY(0.82);
      }
    }
  </style>
  <g class="folder-icon">
    <g class="folder-base">
      <path class="folder-back" d="M14.5 25.8c0-3.2 2.6-5.8 5.8-5.8h12.5c2 0 3 .8 4.1 2.3l2 2.7h14.7c3.1 0 5.7 2.5 5.7 5.7v19.7H14.5z"/>
      <path class="folder-sheet" d="M24.6 29.3h19.8c2.5 0 4.5 2 4.5 4.5v16.6H23.1V30.8c0-.8.7-1.5 1.5-1.5z"/>
      <path class="folder-front" d="M13 36.3c0-3.2 2.6-5.8 5.8-5.8h34.4c3.2 0 5.8 2.6 5.8 5.8v13.9c0 4.3-3.5 7.8-7.8 7.8H20.8c-4.3 0-7.8-3.5-7.8-7.8z"/>
      <path class="folder-highlight" d="M16.4 47.5c7.2-4.3 14.7-4.7 22.4-1.1 6 2.8 11.4 2.6 16.7-.3v6.7c0 2.1-1.7 3.8-3.8 3.8H20.4c-2.2 0-4-1.8-4-4z"/>
      <path class="folder-sheen" d="M21 46.4c9-7.8 19.8-9 32.5-3.6l-3.1 5.2c-10-4.1-18.8-3-26.5 3.5z"/>
    </g>
    <path class="folder-shadow-line" d="M23.2 62h25.6"/>
  </g>
</svg>
