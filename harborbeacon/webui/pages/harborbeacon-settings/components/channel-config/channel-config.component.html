<section class="channel-config">
  <h3 class="section-title">
    <mat-icon>forum</mat-icon>
    IM Channel Configuration
  </h3>
  <p class="section-desc">
    Enable the messaging channels you want HarborBeacon to listen on.
    Provide credentials to activate each channel.
  </p>

  <mat-accordion multi>
    @for (m of meta; track m.channel) {
      <mat-expansion-panel [expanded]="getConfig(m.channel).enabled">
        <!-- header -->
        <mat-expansion-panel-header>
          <mat-panel-title>
            <mat-icon class="channel-icon">{{ m.icon }}</mat-icon>
            <span class="channel-label">{{ m.label }}</span>
          </mat-panel-title>
          <mat-panel-description>
            <mat-slide-toggle
              [checked]="getConfig(m.channel).enabled"
              (change)="onToggle(m.channel, $event.checked)"
              (click)="$event.stopPropagation()"
            ></mat-slide-toggle>
          </mat-panel-description>
        </mat-expansion-panel-header>

        <!-- credential fields -->
        <div class="channel-fields">
          @for (field of m.credentialFields; track field) {
            <mat-form-field appearance="outline" class="field-full">
              <mat-label>{{ fieldLabel(field) }}</mat-label>
              <input
                matInput
                [type]="inputType(field)"
                [value]="fieldValue(getConfig(m.channel), field)"
                (input)="onFieldChange(m.channel, field, $any($event.target).value)"
                autocomplete="off"
              />
            </mat-form-field>
          }

          <button
            mat-stroked-button
            color="primary"
            class="test-btn"
            [disabled]="!getConfig(m.channel).enabled"
            (click)="onTest(m.channel)"
          >
            <mat-icon>wifi_tethering</mat-icon>
            Test Connection
          </button>
        </div>
      </mat-expansion-panel>
    }
  </mat-accordion>
</section>
