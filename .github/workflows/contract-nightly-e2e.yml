name: Contract Nightly E2E

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e_matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env_profile:
          - env-a
          - env-b
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bin run-e2e-suite
      - run: ./target/release/run-e2e-suite --env ${{ matrix.env_profile }} --report e2e-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-${{ matrix.env_profile }}
          path: |
            e2e-report.json
            latency-summary.json
            audit-coverage-summary.json