name: Contract Release Drift

on:
  push:
    branches:
      - release/**
  workflow_dispatch:
    inputs:
      harbor_ref:
        description: HarborBeacon reference to compare
        required: false
        default: develop
      upstream_ref:
        description: Upstream reference to compare
        required: false
        default: master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift_compatibility:
    runs-on: ubuntu-latest
    env:
      HARBOR_REF: ${{ github.event.inputs.harbor_ref || 'develop' }}
      UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'master' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bin run-drift-matrix
      - run: ./target/release/run-drift-matrix --harbor-ref "$HARBOR_REF" --upstream-ref "$UPSTREAM_REF" --report drift-matrix-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-matrix-report
          path: drift-matrix-report.json

  release_gate:
    runs-on: ubuntu-latest
    needs: drift_compatibility
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bin evaluate-release-gate
      - uses: actions/download-artifact@v4
        with:
          name: drift-matrix-report
      - run: ./target/release/evaluate-release-gate drift-matrix-report.json --output release-gate-summary.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-gate-summary
          path: release-gate-summary.json