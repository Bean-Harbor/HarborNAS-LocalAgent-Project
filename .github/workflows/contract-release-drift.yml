name: Contract Release Drift

on:
  push:
    branches:
      - release/**
  workflow_dispatch:
    inputs:
      harbor_ref:
        description: HarborNAS reference to compare
        required: false
        default: develop
      upstream_ref:
        description: Upstream reference to compare
        required: false
        default: master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift_compatibility:
    runs-on: ubuntu-latest
    env:
      HARBOR_REF: ${{ github.event.inputs.harbor_ref || 'develop' }}
      UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'master' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python scripts/run_drift_matrix.py --harbor-ref "$HARBOR_REF" --upstream-ref "$UPSTREAM_REF" --report drift-matrix-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-matrix-report
          path: drift-matrix-report.json

  release_gate:
    runs-on: ubuntu-latest
    needs: drift_compatibility
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: drift-matrix-report
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/evaluate_release_gate.py drift-matrix-report.json --output release-gate-summary.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-gate-summary
          path: release-gate-summary.json