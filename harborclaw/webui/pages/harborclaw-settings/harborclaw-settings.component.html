<div class="harborclaw-settings">
  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <mat-icon class="header-icon">smart_toy</mat-icon>
      <div>
        <h1>HarborClaw Settings</h1>
        <p class="subtitle">
          Configure AI assistant channels, autonomy level, and execution routes.
        </p>
      </div>
    </div>
    <button
      mat-flat-button
      color="primary"
      class="save-btn"
      [disabled]="!dirty || saving"
      (click)="save()"
    >
      @if (saving) {
        Saving…
      } @else {
        Save Changes
      }
    </button>
  </div>

  @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  <!-- Tabs -->
  <mat-tab-group animationDuration="200ms" class="settings-tabs">
    <!-- Tab 1: IM Channels -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>forum</mat-icon>
        IM Channels
      </ng-template>
      <div class="tab-body">
        <ix-harborclaw-channel-config
          [channels]="channels"
          (channelsChange)="onChannelsChange($event)"
          (testChannel)="onTestChannel($event)"
        ></ix-harborclaw-channel-config>
      </div>
    </mat-tab>

    <!-- Tab 2: Autonomy -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>security</mat-icon>
        Autonomy
      </ng-template>
      <div class="tab-body">
        <ix-harborclaw-autonomy-config
          [config]="autonomy"
          (configChange)="onAutonomyChange($event)"
        ></ix-harborclaw-autonomy-config>
      </div>
    </mat-tab>

    <!-- Tab 3: Route Strategy -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>alt_route</mat-icon>
        Routes
      </ng-template>
      <div class="tab-body">
        <ix-harborclaw-route-strategy
          [routePriority]="routePriority"
          [routeStatuses]="routeStatuses"
          (routePriorityChange)="onRoutePriorityChange($event)"
        ></ix-harborclaw-route-strategy>
      </div>
    </mat-tab>

    <!-- Tab 4: Connectivity -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>wifi_tethering</mat-icon>
        Connectivity
      </ng-template>
      <div class="tab-body">
        <ix-harborclaw-connectivity-test
          [channels]="channels"
          [results]="connectivityResults"
          [loading]="testingConnectivity"
          (runTest)="onRunConnectivityTest($event)"
        ></ix-harborclaw-connectivity-test>
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
